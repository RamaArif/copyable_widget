name: copyable_widget
description: >-
  Zero-boilerplate clipboard copy for any Flutter widget or text.
  Long-press or tap to copy, with haptic feedback and SnackBar confirmation.
  Works on Android, iOS, Web, macOS, Windows, and Linux.
version: 1.0.0
homepage: https://github.com/RamaArif/copyable_widget
repository: https://github.com/RamaArif/copyable_widget
issue_tracker: https://github.com/RamaArif/copyable_widget/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
